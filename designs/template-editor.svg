  <text x="40" y="62" fill="#6b7280" font-family="system-ui,sans-serif" font-size="13">Pipeline template · 5 stages</text>
  
  <rect x="990" y="18" width="80" height="34" rx="8" fill="transparent" stroke="#374151" stroke-width="1"/>
