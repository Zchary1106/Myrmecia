  <text x="80" y="609" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" dx="7">✓</text>
  <text x="104" y="610" fill="#fff" font-family="system-ui,sans-serif" font-size="12">Spec (Stage 1)</text>

  <rect x="220" y="598" width="14" height="14" rx="3" fill="#6366f1"/>
  <text x="220" y="609" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" dx="7">✓</text>
  <text x="244" y="610" fill="#fff" font-family="system-ui,sans-serif" font-size="12">Design (Stage 2)</text>

