  <text x="64" y="697" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">💡 提示: 点击 Stage 节点上的齿轮图标编辑配置，点击 "+" 在节点间插入新 Stage，拖拽右侧面板的 Stage 到流程中</text>
