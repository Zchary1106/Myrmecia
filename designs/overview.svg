<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#0f1117"/>

  <!-- Header -->
  <text x="32" y="40" fill="#fff" font-size="20" font-weight="700">🏭 Agent Factory</text>
  <text x="200" y="40" fill="#6b7280" font-size="13">多智能体编排中心</text>
  <circle cx="1140" cy="34" r="6" fill="#22c55e"/>
  <text x="1100" y="38" fill="#6b7280" font-size="11" text-anchor="end">System Healthy</text>

  <!-- Stats Bar -->
  <g transform="translate(24,58)">
    <!-- Active Agents -->
    <rect width="275" height="80" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <text x="20" y="30" fill="#9ca3af" font-size="12">活跃 Agents</text>
    <text x="20" y="58" fill="#fff" font-size="28" font-weight="700">4<tspan fill="#6b7280" font-size="16">/6</tspan></text>
    <rect x="200" y="20" width="50" height="40" rx="8" fill="#6366f120"/>
    <text x="225" y="46" fill="#6366f1" font-size="20" text-anchor="middle">🤖</text>

    <!-- Running Tasks -->
    <g transform="translate(291,0)">
      <rect width="275" height="80" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <text x="20" y="30" fill="#9ca3af" font-size="12">运行中任务</text>
      <text x="20" y="58" fill="#fff" font-size="28" font-weight="700">3</text>
      <rect x="200" y="20" width="50" height="40" rx="8" fill="#22c55e20"/>
      <text x="225" y="46" fill="#22c55e" font-size="20" text-anchor="middle">⚡</text>
    </g>

    <!-- Pipelines -->
    <g transform="translate(582,0)">
      <rect width="275" height="80" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <text x="20" y="30" fill="#9ca3af" font-size="12">Pipelines</text>
      <text x="20" y="58" fill="#fff" font-size="28" font-weight="700">2</text>
      <rect x="200" y="20" width="50" height="40" rx="8" fill="#f59e0b20"/>
      <text x="225" y="46" fill="#f59e0b" font-size="20" text-anchor="middle">🔗</text>
    </g>

    <!-- Today's Cost -->
    <g transform="translate(873,0)">
      <rect width="275" height="80" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <text x="20" y="30" fill="#9ca3af" font-size="12">今日消耗</text>
      <text x="20" y="58" fill="#fff" font-size="28" font-weight="700">$4.32</text>
      <rect x="200" y="20" width="50" height="40" rx="8" fill="#ef444420"/>
      <text x="225" y="46" fill="#ef4444" font-size="20" text-anchor="middle">💰</text>
    </g>
  </g>

  <!-- Agent Status Grid -->
  <text x="32" y="176" fill="#fff" font-size="15" font-weight="600">Agent 状态</text>

  <g transform="translate(24,190)">
    <!-- Row 1 -->
    <!-- PM -->
    <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <rect width="240" height="4" rx="2" y="0" fill="#22c55e" opacity="0.8"/>
    <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">🎯 PM Agent</text>
    <rect x="160" y="20" width="64" height="22" rx="6" fill="#22c55e20"/>
    <text x="192" y="36" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="500">Working</text>
    <text x="16" y="60" fill="#9ca3af" font-size="11">当前任务:</text>
    <text x="16" y="78" fill="#c4b5fd" font-size="12">需求拆解 - Todo App</text>
    <text x="16" y="98" fill="#6b7280" font-size="10">⏱ 2m 30s · 1.2k tokens</text>

    <!-- UI -->
    <g transform="translate(256,0)">
      <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <rect width="240" height="4" rx="2" y="0" fill="#6b7280" opacity="0.5"/>
      <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">🎨 UI Agent</text>
      <rect x="172" y="20" width="52" height="22" rx="6" fill="#6b728020"/>
      <text x="198" y="36" fill="#6b7280" font-size="11" text-anchor="middle" font-weight="500">Idle</text>
      <text x="16" y="60" fill="#9ca3af" font-size="11">等待任务分配</text>
      <text x="16" y="98" fill="#6b7280" font-size="10">上次: 设计登录页 · 5m ago</text>
    </g>

    <!-- Dev -->
    <g transform="translate(512,0)">
      <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <rect width="240" height="4" rx="2" y="0" fill="#22c55e" opacity="0.8"/>
      <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">⌨️ Dev Agent</text>
      <rect x="160" y="20" width="64" height="22" rx="6" fill="#22c55e20"/>
      <text x="192" y="36" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="500">Working</text>
      <text x="16" y="60" fill="#9ca3af" font-size="11">当前任务:</text>
      <text x="16" y="78" fill="#c4b5fd" font-size="12">Build weather app</text>
      <text x="16" y="98" fill="#6b7280" font-size="10">⏱ 8m 12s · 14.3k tokens</text>
    </g>

    <!-- Row 2 -->
    <!-- QA -->
    <g transform="translate(0,126)">
      <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <rect width="240" height="4" rx="2" y="0" fill="#22c55e" opacity="0.8"/>
      <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">🔍 QA Agent</text>
      <rect x="160" y="20" width="64" height="22" rx="6" fill="#22c55e20"/>
      <text x="192" y="36" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="500">Working</text>
      <text x="16" y="60" fill="#9ca3af" font-size="11">当前任务:</text>
      <text x="16" y="78" fill="#c4b5fd" font-size="12">Review auth module</text>
      <text x="16" y="98" fill="#6b7280" font-size="10">⏱ 1m 45s · 3.1k tokens</text>
    </g>

    <!-- Ops -->
    <g transform="translate(256,126)">
      <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <rect width="240" height="4" rx="2" y="0" fill="#f59e0b" opacity="0.8"/>
      <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">🚀 Ops Agent</text>
      <rect x="156" y="20" width="68" height="22" rx="6" fill="#f59e0b20"/>
      <text x="190" y="36" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="500">Blocked</text>
      <text x="16" y="60" fill="#9ca3af" font-size="11">等待审批:</text>
      <text x="16" y="78" fill="#fbbf24" font-size="12">Deploy v2.0 → Staging</text>
      <text x="16" y="98" fill="#6b7280" font-size="10">⏱ 等待 Gate 审批中...</text>
    </g>

    <!-- Review -->
    <g transform="translate(512,126)">
      <rect width="240" height="110" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
      <rect width="240" height="4" rx="2" y="0" fill="#6b7280" opacity="0.5"/>
      <text x="16" y="36" fill="#fff" font-size="15" font-weight="600">📝 Review Agent</text>
      <rect x="172" y="20" width="52" height="22" rx="6" fill="#6b728020"/>
      <text x="198" y="36" fill="#6b7280" font-size="11" text-anchor="middle" font-weight="500">Idle</text>
      <text x="16" y="60" fill="#9ca3af" font-size="11">等待任务分配</text>
      <text x="16" y="98" fill="#6b7280" font-size="10">上次: Code review #42 · 12m ago</text>
    </g>
  </g>

  <!-- Right Panel: Recent Activity -->
  <g transform="translate(790,162)">
    <rect width="386" height="540" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <text x="20" y="30" fill="#fff" font-size="14" font-weight="600">📋 最近活动</text>

    <!-- Timeline items -->
    <g transform="translate(20,50)">
      <circle cx="6" cy="6" r="5" fill="#22c55e"/>
      <line x1="6" y1="14" x2="6" y2="70" stroke="#374151" stroke-width="1"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">Dev Agent 完成任务</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Fix login redirect · 耗时 4m 22s</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">2 分钟前</text>
    </g>

    <g transform="translate(20,120)">
      <circle cx="6" cy="6" r="5" fill="#6366f1"/>
      <line x1="6" y1="14" x2="6" y2="70" stroke="#374151" stroke-width="1"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">Pipeline 阶段推进</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Todo App: Design → Code</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">5 分钟前</text>
    </g>

    <g transform="translate(20,190)">
      <circle cx="6" cy="6" r="5" fill="#f59e0b"/>
      <line x1="6" y1="14" x2="6" y2="70" stroke="#374151" stroke-width="1"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">Ops Agent 等待审批</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Deploy v2.0 需要 Gate 审批</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">8 分钟前</text>
    </g>

    <g transform="translate(20,260)">
      <circle cx="6" cy="6" r="5" fill="#22c55e"/>
      <line x1="6" y1="14" x2="6" y2="70" stroke="#374151" stroke-width="1"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">QA Agent 发现问题</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Auth module: 2 edge cases failed</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">12 分钟前</text>
    </g>

    <g transform="translate(20,330)">
      <circle cx="6" cy="6" r="5" fill="#6366f1"/>
      <line x1="6" y1="14" x2="6" y2="70" stroke="#374151" stroke-width="1"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">新任务创建</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Build weather app · Master 模式</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">15 分钟前</text>
    </g>

    <g transform="translate(20,400)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">PM Agent 任务失败</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">需求解析超时 · 已自动重试</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">22 分钟前</text>
    </g>

    <g transform="translate(20,470)">
      <circle cx="6" cy="6" r="5" fill="#22c55e"/>
      <text x="22" y="6" fill="#fff" font-size="12" font-weight="500">Review Agent 完成审阅</text>
      <text x="22" y="22" fill="#9ca3af" font-size="11">Code review #42 · Approved ✓</text>
      <text x="22" y="38" fill="#6b7280" font-size="10">30 分钟前</text>
    </g>
  </g>

  <!-- System Health Bar -->
  <g transform="translate(24,460)">
    <rect width="750" height="60" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <text x="20" y="24" fill="#9ca3af" font-size="11">系统健康</text>
    <text x="20" y="44" fill="#22c55e" font-size="12" font-weight="500">● CPU 23%</text>
    <text x="130" y="44" fill="#22c55e" font-size="12" font-weight="500">● Memory 1.2GB</text>
    <text x="270" y="44" fill="#22c55e" font-size="12" font-weight="500">● API Latency 120ms</text>
    <text x="440" y="44" fill="#f59e0b" font-size="12" font-weight="500">● Token Rate 82/min</text>
    <text x="600" y="44" fill="#22c55e" font-size="12" font-weight="500">● Uptime 99.8%</text>
  </g>

  <!-- Quick Actions -->
  <g transform="translate(24,536)">
    <rect width="750" height="50" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <text x="20" y="30" fill="#9ca3af" font-size="11">快捷操作</text>
    <rect x="100" y="12" width="100" height="28" rx="8" fill="url(#accent)"/>
    <text x="150" y="31" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">+ 新任务</text>
    <rect x="214" y="12" width="120" height="28" rx="8" fill="#374151"/>
    <text x="274" y="31" fill="#d1d5db" font-size="12" text-anchor="middle">+ New Pipeline</text>
    <rect x="348" y="12" width="100" height="28" rx="8" fill="#374151"/>
    <text x="398" y="31" fill="#d1d5db" font-size="12" text-anchor="middle">暂停全部</text>
    <rect x="462" y="12" width="100" height="28" rx="8" fill="#374151"/>
    <text x="512" y="31" fill="#d1d5db" font-size="12" text-anchor="middle">查看日志</text>
  </g>

  <!-- Bottom nav hint -->
  <text x="600" y="880" fill="#374151" font-size="11" text-anchor="middle">Overview · Tasks · Pipelines · Agents · Settings</text>
  <rect x="549" y="870" width="60" height="2" rx="1" fill="#6366f1"/>
</svg>