  <text x="186" y="40" fill="#6b7280" font-size="13">Agent Detail</text>

  <!-- Agent Profile Header -->
  <g transform="translate(24,58)">
    <rect width="1152" height="80" rx="12" fill="#1a1b23" filter="url(#shadow)"/>
    <!-- Avatar circle -->
    <rect x="16" y="14" width="52" height="52" rx="12" fill="#6366f120"/>
    <text x="42" y="48" fill="#818cf8" font-size="24" text-anchor="middle">⌨️</text>
    <!-- Name & status -->
