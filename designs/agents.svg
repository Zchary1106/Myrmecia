    <rect x="192" y="18" width="72" height="24" rx="6" fill="#22c55e20"/>
    <text x="228" y="35" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="500">Working</text>
    <text x="80" y="56" fill="#9ca3af" font-size="12">当前任务: <tspan fill="#c4b5fd">Build weather app</tspan> · Master 模式 · 8m 12s</text>
    <!-- Actions -->
    <rect x="920" y="22" width="90" height="32" rx="8" fill="#374151"/>
    <text x="965" y="43" fill="#d1d5db" font-size="11" text-anchor="middle">编辑配置</text>
    <rect x="1020" y="22" width="110" height="32" rx="8" fill="#ef444430" stroke="#ef4444" stroke-width="1"/>
    <text x="1075" y="43" fill="#ef4444" font-size="11" text-anchor="middle">停止 Agent</text>
  </g>

