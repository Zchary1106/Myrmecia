<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Dark Overlay -->
  <rect width="800" height="700" fill="#0f1117" opacity="0.85"/>
  
  <!-- Modal Card -->
  <rect x="40" y="30" width="720" height="640" rx="16" fill="#1a1b23" filter="url(#shadow)" stroke="#374151" stroke-width="1"/>
  
  <!-- Modal Header -->
  <text x="72" y="72" fill="#fff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">创建新任务</text>
  <text x="712" y="72" fill="#6b7280" font-family="system-ui,sans-serif" font-size="20" text-anchor="end" style="cursor:pointer">✕</text>

  <!-- Mode Selector -->
  <text x="72" y="104" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">选择任务模式</text>

  <!-- Mode 1: Master Dispatch (selected) -->
  <rect x="72" y="116" width="206" height="100" rx="12" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="2"/>
  <text x="134" y="150" fill="#fff" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">🧠</text>
  <text x="175" y="150" fill="#fff" font-family="system-ui,sans-serif" font-size="24">🧠</text>
  <text x="175" y="176" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Master Dispatch</text>
  <text x="175" y="196" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">AI 自动分解与分配</text>
  <!-- Selected indicator -->
  <circle cx="256" cy="130" r="8" fill="#6366f1"/>
  <text x="256" y="134" fill="#fff" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">✓</text>

  <!-- Mode 2: Direct Assign -->
  <rect x="296" y="116" width="206" height="100" rx="12" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="399" y="150" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">🎯</text>
  <text x="399" y="176" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Direct Assign</text>
  <text x="399" y="196" fill="#6b7280" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">直接指派给指定 Agent</text>

  <!-- Mode 3: Pipeline Flow -->
  <rect x="520" y="116" width="206" height="100" rx="12" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="623" y="150" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">🔗</text>
  <text x="623" y="176" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Pipeline Flow</text>
  <text x="623" y="196" fill="#6b7280" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">按流水线模板执行</text>

  <!-- Task Title -->
  <text x="72" y="248" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">任务标题</text>
  <rect x="72" y="258" width="654" height="40" rx="8" fill="#0f1117" stroke="#374151" stroke-width="1"/>
  <text x="88" y="283" fill="#6b7280" font-family="system-ui,sans-serif" font-size="13">输入任务标题...</text>

  <!-- Description -->
  <text x="72" y="322" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">任务描述</text>
  <rect x="72" y="332" width="654" height="140" rx="8" fill="#0f1117" stroke="#374151" stroke-width="1"/>
  <text x="88" y="360" fill="#6b7280" font-family="system-ui,sans-serif" font-size="13">描述你的需求...</text>

  <!-- Priority -->
  <text x="72" y="500" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">优先级</text>
  <rect x="72" y="510" width="70" height="32" rx="16" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="90" y="531" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">Low</text>

  <rect x="154" y="510" width="84" height="32" rx="16" fill="#6366f1"/>
  <text x="176" y="531" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Normal</text>

  <rect x="250" y="510" width="72" height="32" rx="16" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="268" y="531" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">High</text>

  <rect x="334" y="510" width="80" height="32" rx="16" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="350" y="531" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">Urgent</text>

  <!-- Estimated Cost -->
  <rect x="72" y="560" width="654" height="36" rx="8" fill="#6366f1" opacity="0.08" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="92" y="583" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">💡 预估成本: </text>
  <text x="195" y="583" fill="#6366f1" font-family="system-ui,sans-serif" font-size="13" font-weight="600">$3-5 estimated</text>
  <text x="320" y="583" fill="#6b7280" font-family="system-ui,sans-serif" font-size="11">(Master 自动分配 3-4 个 Agent)</text>

  <!-- Footer -->
  <line x1="72" y1="612" x2="726" y2="612" stroke="#374151" stroke-width="0.5"/>
  
  <rect x="530" y="626" width="80" height="36" rx="8" fill="transparent" stroke="#374151" stroke-width="1"/>
  <text x="549" y="649" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="13">Cancel</text>

  <rect x="624" y="626" width="102" height="36" rx="8" fill="#6366f1"/>
  <text x="644" y="649" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">创建任务</text>
</svg>