  <text x="160" y="40" fill="#6b7280" font-size="13">Task Kanban</text>

  <!-- Mode chips + Create button -->
  <g transform="translate(660,18)">
    <rect x="0" y="0" width="130" height="32" rx="8" fill="#1a1b23" stroke="#374151" stroke-width="1"/>
    <text x="65" y="21" fill="#9ca3af" font-size="11" text-anchor="middle">Master Dispatch</text>
    <rect x="140" y="0" width="110" height="32" rx="8" fill="#1a1b23" stroke="#374151" stroke-width="1"/>
    <text x="195" y="21" fill="#9ca3af" font-size="11" text-anchor="middle">Direct Assign</text>
    <rect x="260" y="0" width="90" height="32" rx="8" fill="#1a1b23" stroke="#374151" stroke-width="1"/>
    <text x="305" y="21" fill="#9ca3af" font-size="11" text-anchor="middle">Pipeline</text>
    <rect x="370" y="0" width="130" height="32" rx="8" fill="url(#accent)"/>
    <text x="435" y="21" fill="#fff" font-size="12" text-anchor="middle" font-weight="600">+ Create Task</text>
  </g>

  <!-- Kanban Columns -->
