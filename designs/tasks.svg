      <text x="40" y="52" fill="#22c55e" font-size="10" text-anchor="middle">Direct</text>
      <text x="12" y="78" fill="#9ca3af" font-size="11">⌨️ Dev Agent</text>
      <text x="12" y="96" fill="#6b7280" font-size="10">P2 · 预估 15 min</text>
      <text x="12" y="112" fill="#6b7280" font-size="10">⏱ 排队中</text>
