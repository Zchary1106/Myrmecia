      <text x="47" y="136" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">Approve</text>
      <rect x="90" y="120" width="70" height="24" rx="6" fill="#ef4444"/>
      <text x="125" y="136" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">Reject</text>
