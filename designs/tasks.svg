      <rect x="12" y="38" width="68" height="20" rx="5" fill="#6366f120"/>
      <text x="46" y="52" fill="#818cf8" font-size="10" text-anchor="middle">Pipeline</text>
      <text x="12" y="78" fill="#9ca3af" font-size="11">🚀 Ops Agent</text>
      <text x="12" y="96" fill="#6b7280" font-size="10">等待前置阶段完成</text>
      <text x="12" y="112" fill="#6b7280" font-size="10">⏱ 排队中</text>
    </g>

    <!-- Task Card 2 -->
    <g transform="translate(12,178)">
