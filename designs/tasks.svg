    <rect x="230" y="14" width="32" height="22" rx="6" fill="#374151"/>
    <text x="246" y="30" fill="#9ca3af" font-size="11" text-anchor="middle">3</text>

    <!-- Task Card 1 -->
    <g transform="translate(12,46)">
      <rect width="256" height="120" rx="10" fill="#0f1117" stroke="#374151" stroke-width="1"/>
