      <text x="12" y="44" fill="#6b7280" font-size="11">🎨 UI · Master · 6m 10s</text>
      <text x="12" y="62" fill="#6b7280" font-size="10">✅ $0.32 · 18 分钟前</text>
      <text x="12" y="80" fill="#22c55e" font-size="10">成功</text>
    </g>

    <g transform="translate(12,250)">
      <rect width="256" height="90" rx="10" fill="#0f1117" stroke="#374151" stroke-width="1" opacity="0.7"/>
      <text x="12" y="24" fill="#9ca3af" font-size="13" font-weight="500">Code review #42</text>
      <text x="12" y="44" fill="#6b7280" font-size="11">📝 Review · Direct · 3m 05s</text>
      <text x="12" y="62" fill="#6b7280" font-size="10">✅ $0.12 · 30 分钟前</text>
      <text x="12" y="80" fill="#22c55e" font-size="10">Approved</text>
    </g>

    <g transform="translate(12,352)">
      <rect width="256" height="90" rx="10" fill="#0f1117" stroke="#374151" stroke-width="1" opacity="0.7"/>
      <text x="12" y="24" fill="#9ca3af" font-size="13" font-weight="500">数据库迁移脚本</text>
      <text x="12" y="44" fill="#6b7280" font-size="11">⌨️ Dev · Pipeline · 12m 40s</text>
      <text x="12" y="62" fill="#6b7280" font-size="10">✅ $0.56 · 1 小时前</text>
      <text x="12" y="80" fill="#22c55e" font-size="10">成功</text>
    </g>
  </g>

  <!-- Bottom nav -->
  <text x="600" y="888" fill="#374151" font-size="11" text-anchor="middle">Overview · Tasks · Pipelines · Agents · Settings</text>
  <rect x="577" y="878" width="42" height="2" rx="1" fill="#6366f1"/>
</svg>