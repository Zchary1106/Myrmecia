        <text x="12" y="100" fill="#22c55e">✓ src/hooks/</text>
        <text x="12" y="118" fill="#22c55e">✓ src/utils/</text>
        <text x="12" y="140" fill="#6366f1">$ Writing src/App.tsx...</text>
        <text x="12" y="158" fill="#d1d5db">  import React from 'react';</text>
        <text x="12" y="176" fill="#d1d5db">  import { TodoList } from './components/TodoList';</text>
        <text x="12" y="194" fill="#d1d5db">  import { useTodos } from './hooks/useTodos';</text>
        <text x="12" y="216" fill="#6366f1">$ Writing src/components/TodoList.tsx...</text>
        <text x="12" y="234" fill="#d1d5db">  export const TodoList: React.FC = () =&gt; {'{'}</text>
        <text x="12" y="252" fill="#d1d5db">    const [todos, setTodos] = useTodos();</text>
        <text x="12" y="270" fill="#d1d5db">    return (</text>
        <text x="12" y="288" fill="#d1d5db">      &lt;div className="todo-container"&gt;</text>
        <text x="12" y="310" fill="#6366f1">$ Writing src/components/TodoItem.tsx...</text>
        <text x="12" y="328" fill="#22c55e">✓ TodoItem component complete</text>
        <text x="12" y="350" fill="#6366f1">$ Writing src/hooks/useTodos.ts...</text>
        <text x="12" y="368" fill="#f59e0b">⟳ Processing... (14,302 tokens used)</text>
        <!-- Blinking cursor -->
