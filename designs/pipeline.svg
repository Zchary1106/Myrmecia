  <!-- Bottom nav -->
  <text x="600" y="888" fill="#374151" font-size="11" text-anchor="middle">Overview · Tasks · Pipelines · Agents · Settings</text>
  <rect x="565" y="878" width="66" height="2" rx="1" fill="#6366f1"/>
