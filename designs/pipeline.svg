      <text x="0" y="34" fill="#6b7280" font-size="11">代码阶段完成后需要人工审批才能进入测试阶段</text>
      <rect x="0" y="46" width="100" height="36" rx="8" fill="#22c55e"/>
      <text x="50" y="70" fill="#fff" font-size="12" text-anchor="middle" font-weight="600">✓ Approve</text>
      <rect x="112" y="46" width="80" height="36" rx="8" fill="#374151"/>
      <text x="152" y="70" fill="#d1d5db" font-size="12" text-anchor="middle">Skip</text>
      <rect x="204" y="46" width="80" height="36" rx="8" fill="#f59e0b"/>
      <text x="244" y="70" fill="#fff" font-size="12" text-anchor="middle">⏸ Pause</text>
      <rect x="296" y="46" width="80" height="36" rx="8" fill="#ef4444"/>
