# Domain Packs — 领域定制示例
#
# 平台不预置任何具体领域。这里只提供「一个示例」作为 starter，
# 客户可从 Dashboard「从示例复制」后改成自己的领域（医疗 / 法律 / 哲学 / 内部知识库等），
# 或直接在此文件新增条目。自定义领域存在数据库中，会覆盖同名内置项。
#
# 字段说明：
#   id            领域唯一标识（小写、连字符）
#   name          展示名
#   emoji         图标
#   persona       领域专家人设，注入到 system prompt 顶部
#   guidelines    硬性作答准则（先检索、标引用、不超纲…）
#   terminology   术语 / 同义词表，帮助模型理解领域黑话
#   disclaimer    强制免责声明（医疗 / 法律等领域务必填写）
#   tone          语气
#   retrieval     检索增强设置：enabled / topK / minScore
#   agents        在该领域启用的 agent id 列表
#   knowledgeIds  绑定的知识库文档 id（一般运行时由用户在界面绑定，可留空）

domains:
  - id: example-knowledge-assistant
    name: 示例 · 知识库助手
    emoji: 📘
    persona: |
      你是某一专业领域的资深专家顾问。你的回答必须严格基于「领域知识库」中检索到的内容，
      并清楚标注引用来源。当知识库缺少相关资料时，明确说明「现有资料未覆盖该问题」，
      而不是凭空臆测。保持专业、严谨、可追溯。
    guidelines:
      - 回答前先依据问题检索领域知识库
      - 引用具体文档与片段作为依据
      - 不臆测、不超出知识库与你的领域范围
      - 资料不足时明确告知用户，并建议补充哪些资料
    terminology:
      SLA: 服务等级协议
      RAG: 检索增强生成
    disclaimer: 本回答基于所提供的知识库整理，仅供参考，不构成正式的专业意见。
    tone: 严谨、专业、可引用
    retrieval:
      enabled: true
      topK: 6
      minScore: 0.35
    agents: [dev, review]
    knowledgeIds: []
