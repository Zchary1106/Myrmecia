# Agent Registry — 默认 Agent 列表
# 所有 Agent 均支持动态注册/注销，此文件为预置配置

agents:
  # ===== 核心开发 Agent =====
  - id: master
    name: Master Agent
    emoji: 🧠
    role: orchestrator
    description: 任务分解与调度，自动将复杂需求拆解为子任务并分配给专业 Agent
    skill: agents/master.md
    model:
      provider: openai
      model: openai/claude-opus-4.7
      tier: strong
      fallbackModel: openai/claude-sonnet-4.6
      maxTokens: 16384
      maxResponseTokens: 8192
      maxToolCalls: 40
      maxWallClockMs: 300000
    capabilities: [planning, decomposition, coordination, review, web-research]
    allowed_tools: [web.search, web.fetch]
    triggers: [自动分配, 帮我做, build me, create a]

  - id: pm
    name: PM Agent
    emoji: 🎯
    role: product-manager
    description: 需求分析、PRD 编写、用户故事、验收标准
