      provider: openai
      model: openai/claude-sonnet-4.6
      tier: strong
      fallbackModel: openai/claude-haiku-4.5
      maxTokens: 8192
      maxResponseTokens: 4096
      maxToolCalls: 24
      maxWallClockMs: 240000
    capabilities: [spec, user-stories, requirements, acceptance-criteria, web-research]
    allowed_tools: [web.search, web.fetch, content.hashtag_plan]
    triggers: [需求, spec, PRD, 用户故事, requirement]

