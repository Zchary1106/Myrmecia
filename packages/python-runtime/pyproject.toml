[project]
name = "agent-factory-python-runtime"
version = "0.1.0"
description = "Agent Factory Python Runtime — executes agent tasks via LLM"
requires-python = ">=3.11"
dependencies = [
    "crewai>=0.80.0",
    "anthropic>=0.40.0",
    "openai>=1.50.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8.0",
]

[tool.ruff]
line-length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
